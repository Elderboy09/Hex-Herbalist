<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Herbarium — คลังสมุนไพรเวทมนตร์</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Sarabun:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0e0a04;
  --bark-dark: #1a1007;
  --bark: #2e1d08;
  --bark-mid: #4a2e0e;
  --copper: #7a4a1a;
  --bronze: #a0622a;
  --bronze-light: #c07a30;
  --gold: #c89428;
  --parchment-dark: #b89060;
  --parchment: #d4b07a;
  --parchment-light: #e8cfa0;
  --cream: #f0e0bc;
  --forest-dark: #0d1f0d;
  --forest: #1a3a1a;
  --forest-mid: #2a5a2a;
  --moss: #3d7a3d;
  --leaf: #5a9e4a;
  --sage: #7ab870;
  --sage-light: #a0cc90;
  --steam: rgba(200,180,140,0.12);
  --pipe: #5a3a18;
  --cold: rgba(160,210,200,0.7);
  --cold-glow: #7dc8b0;
  --warm: rgba(200,148,40,0.7);
  --danger: #8b1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bark-dark);
  color: var(--parchment-light);
  font-family: 'Sarabun', serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === WOOD GRAIN BACKGROUND === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      91deg,
      transparent 0px,
      transparent 18px,
      rgba(80,45,10,0.08) 18px,
      rgba(80,45,10,0.08) 20px
    ),
    repeating-linear-gradient(
      89deg,
      transparent 0px,
      transparent 35px,
      rgba(30,15,5,0.06) 35px,
      rgba(30,15,5,0.06) 37px
    );
  pointer-events: none;
  z-index: 0;
}

/* === PIPE DECORATION TOP === */
.pipe-header {
  position: relative;
  background: linear-gradient(180deg, #0d0804 0%, var(--bark-dark) 100%);
  border-bottom: 3px solid var(--bronze);
  padding: 0;
  z-index: 10;
  overflow: hidden;
}

.pipe-row {
  display: flex;
  align-items: center;
  height: 18px;
  background: var(--pipe);
  border-top: 1px solid var(--bronze-light);
  border-bottom: 1px solid var(--bark);
  position: relative;
}
.pipe-row::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 60px,
    rgba(192,122,48,0.3) 60px, rgba(192,122,48,0.3) 64px
  );
}
.pipe-row::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(180deg, rgba(255,220,140,0.2) 0%, transparent 100%);
}

.pipe-steam {
  position: absolute;
  bottom: 100%;
  width: 16px;
  animation: steamRise 3s ease-in-out infinite;
  opacity: 0;
}
.pipe-steam:nth-child(1) { left: 64px; animation-delay: 0s; }
.pipe-steam:nth-child(2) { left: 188px; animation-delay: 1.2s; }
.pipe-steam:nth-child(3) { left: 312px; animation-delay: 0.6s; }
.pipe-steam:nth-child(4) { left: 600px; animation-delay: 1.8s; }
.pipe-steam:nth-child(5) { left: 800px; animation-delay: 0.4s; }

@keyframes steamRise {
  0% { opacity: 0; transform: translateY(0) scaleX(1); }
  20% { opacity: 0.6; }
  80% { opacity: 0.2; transform: translateY(-40px) scaleX(1.8); }
  100% { opacity: 0; transform: translateY(-60px) scaleX(2.2); }
}
.pipe-steam svg { width: 16px; height: 40px; }

/* === HEADER CONTENT === */
.site-header {
  padding: 2rem 2rem 1.5rem;
  text-align: center;
  position: relative;
}

.header-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.ornament-line {
  flex: 1;
  max-width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--bronze), transparent);
  position: relative;
}
.ornament-line::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%;
  transform: translateX(-50%);
  width: 5px; height: 5px;
  background: var(--bronze);
  rotate: 45deg;
}
.ornament-gear {
  font-size: 22px;
  color: var(--bronze);
  animation: slowSpin 20s linear infinite;
  display: inline-block;
}
@keyframes slowSpin { to { transform: rotate(360deg); } }

.site-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(24px, 4vw, 42px);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-shadow: 0 0 30px rgba(200,148,40,0.3);
  margin-bottom: 0.3rem;
}
.site-subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  color: var(--parchment);
  font-size: 15px;
  letter-spacing: 0.05em;
}

/* === FLORA DECORATION === */
.flora-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 0.5rem 0;
  overflow: hidden;
}
.flora-bar svg {
  opacity: 0.4;
}

/* === SEARCH & FILTER === */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(26,16,7,0.97);
  border-bottom: 2px solid var(--bark-mid);
  padding: 0.75rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  backdrop-filter: blur(8px);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-wrap::before {
  content: '⊕';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--bronze);
  font-size: 14px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  background: var(--bark);
  border: 1px solid var(--bark-mid);
  border-radius: 3px;
  color: var(--parchment-light);
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  padding: 8px 12px 8px 34px;
  outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--bronze); }
#searchInput::placeholder { color: var(--copper); }

.filter-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pill {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 5px 12px;
  border: 1px solid var(--bark-mid);
  border-radius: 2px;
  background: transparent;
  color: var(--parchment-dark);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--bronze); color: var(--parchment); }
.pill.active {
  background: var(--bark-mid);
  border-color: var(--bronze);
  color: var(--gold);
}

.result-count {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--copper);
  letter-spacing: 0.1em;
  margin-left: auto;
}

/* === CATEGORY SECTION === */
.category-section {
  padding: 0 1.5rem 0.5rem;
  position: relative;
  z-index: 1;
}
.category-section:first-of-type { padding-top: 1.5rem; }

.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--bark-mid);
  position: relative;
}
.cat-icon { font-size: 20px; }
.cat-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--bronze-light);
}
.cat-count {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  color: var(--copper);
  margin-left: auto;
}

/* === HERB GRID === */
.herb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

/* === HERB CARD === */
.herb-card {
  background: var(--bark);
  border: 1px solid var(--bark-mid);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.herb-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    135deg,
    transparent 0px, transparent 8px,
    rgba(80,50,20,0.04) 8px, rgba(80,50,20,0.04) 9px
  );
  pointer-events: none;
}
.herb-card:hover {
  border-color: var(--bronze);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px var(--bronze-light) inset;
}
.herb-card.hidden { display: none; }

.card-sketch {
  background: var(--bark-dark);
  border-bottom: 1px solid var(--bark-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  height: 140px;
  position: relative;
  overflow: hidden;
}
.card-sketch::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(10,6,2,0.6) 100%);
  pointer-events: none;
}
.card-sketch svg {
  width: 100%;
  height: 100%;
  max-height: 120px;
}

.card-body {
  padding: 0.9rem 1rem;
}
.card-thai {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 2px;
  line-height: 1.3;
}
.card-latin {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--copper);
  margin-bottom: 0.6rem;
}
.card-potency {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  margin-bottom: 0.6rem;
}
.potency-cold { background: rgba(100,180,200,0.15); border: 1px solid rgba(100,180,200,0.4); color: #90d0c0; }
.potency-hot { background: rgba(200,80,40,0.15); border: 1px solid rgba(200,80,40,0.4); color: #e09070; }
.potency-neutral { background: rgba(160,130,80,0.15); border: 1px solid rgba(160,130,80,0.4); color: var(--parchment); }

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 0.6rem;
}
.tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 2px;
  background: var(--bark-mid);
  color: var(--parchment-dark);
  border: 1px solid rgba(160,130,80,0.2);
}

.card-summary {
  font-size: 12px;
  color: var(--parchment-dark);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  padding: 0.5rem 1rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-type {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--copper);
  text-transform: uppercase;
}
.card-open {
  font-size: 10px;
  color: var(--bronze-light);
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
}

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,6,2,0.92);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bark);
  border: 1px solid var(--bronze);
  border-radius: 4px;
  max-width: 720px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s;
  scrollbar-width: thin;
  scrollbar-color: var(--bark-mid) transparent;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-pipe-top {
  height: 12px;
  background: var(--pipe);
  border-bottom: 1px solid var(--bronze);
  position: relative;
}
.modal-pipe-top::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 40px,
    rgba(192,122,48,0.4) 40px, rgba(192,122,48,0.4) 44px
  );
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 16px;
  background: var(--bark-mid);
  border: 1px solid var(--bronze);
  color: var(--parchment);
  font-family: 'Cinzel', serif;
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 2px;
  z-index: 10;
  letter-spacing: 0.1em;
}
.modal-close:hover { background: var(--bronze); color: var(--bark-dark); }

.modal-top {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 0;
  min-height: 200px;
}

.modal-sketch-panel {
  background: var(--bark-dark);
  border-right: 1px solid var(--bark-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.modal-sketch-panel svg {
  max-width: 160px;
  max-height: 200px;
  width: 100%;
  height: auto;
}

.modal-info {
  padding: 1.5rem 3rem 1rem 1.5rem;
}
.modal-thai {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
  line-height: 1.2;
}
.modal-latin {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--copper);
  margin-bottom: 0.75rem;
}
.modal-potency {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border-radius: 2px;
  margin-bottom: 0.75rem;
}
.modal-desc {
  font-size: 13px;
  line-height: 1.8;
  color: var(--parchment-dark);
}

.modal-body {
  padding: 0 1.5rem 1.5rem;
}

.modal-section {
  margin-bottom: 1.25rem;
}
.modal-section-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bronze-light);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bark-mid);
}

.modal-properties {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 0.75rem;
}
.modal-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 2px;
  background: var(--bark-mid);
  border: 1px solid rgba(160,130,80,0.25);
  color: var(--parchment);
}

.modal-text {
  font-size: 13px;
  line-height: 1.9;
  color: var(--parchment-dark);
  white-space: pre-line;
}

.modal-warning {
  background: rgba(100,20,20,0.2);
  border: 1px solid rgba(160,60,60,0.4);
  border-radius: 3px;
  padding: 0.75rem 1rem;
  font-size: 12px;
  color: #d09090;
  line-height: 1.7;
}
.modal-warning strong {
  color: #e06060;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}

.method-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.method-item {
  background: var(--bark-dark);
  border: 1px solid var(--bark-mid);
  border-radius: 3px;
  padding: 0.75rem;
}
.method-name {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--bronze-light);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.method-desc {
  font-size: 11px;
  color: var(--parchment-dark);
  line-height: 1.6;
}

/* === FLOOR PIPE === */
.pipe-footer {
  margin-top: 3rem;
  position: relative;
  z-index: 1;
}

/* === NO RESULTS === */
.no-results {
  text-align: center;
  padding: 3rem;
  color: var(--copper);
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 16px;
  display: none;
}
.no-results.visible { display: block; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bark-dark); }
::-webkit-scrollbar-thumb { background: var(--bark-mid); border-radius: 3px; }

@media (max-width: 600px) {
  .modal-top { grid-template-columns: 1fr; }
  .modal-sketch-panel { border-right: none; border-bottom: 1px solid var(--bark-mid); height: 160px; }
  .herb-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="pipe-header">

    <div class="pipe-steam"><svg viewBox="0 0 16 40" fill="none"><path d="M8 38 Q4 28 8 20 Q12 12 8 2" stroke="rgba(220,200,160,0.6)" stroke-width="1.5" stroke-linecap="round"/></svg></div>

    <div class="site-title">✦ Hex Herbarium ✦</div>
    <div class="site-subtitle">คลังสมุนไพรแห่งโลกเวทมนตร์ — The Alchemist's Botanical Registry</div>

    <!-- Flora bar -->
    <div class="flora-bar">
      <svg width="600" height="32" viewBox="0 0 600 32" fill="none">
        <!-- Repeating fern/leaf motif -->
        <g stroke="#5a9e4a" stroke-width="0.8">
          <path d="M20 28 Q20 20 20 14"/>
          <path d="M20 22 Q14 16 10 12"/><path d="M20 22 Q26 16 30 12"/>
          <path d="M20 18 Q13 13 8 10"/><path d="M20 18 Q27 13 32 10"/>
          <path d="M20 26 Q15 20 12 18"/><path d="M20 26 Q25 20 28 18"/>
        </g>
        <g stroke="#5a9e4a" stroke-width="0.8" transform="translate(80,0)">
          <path d="M20 28 Q20 20 20 14"/>
          <path d="M20 22 Q14 16 10 12"/><path d="M20 22 Q26 16 30 12"/>
          <path d="M20 18 Q13 13 8 10"/><path d="M20 18 Q27 13 32 10"/>
        </g>
        <!-- center flower -->
        <g transform="translate(285,4)">
          <circle cx="15" cy="15" r="4" fill="none" stroke="#c89428" stroke-width="0.8"/>
          <path d="M15 3 C13 8,12 10,15 11" fill="#3d7a3d" opacity="0.7"/>
          <path d="M15 3 C17 8,18 10,15 11" fill="#3d7a3d" opacity="0.7"/>
          <path d="M27 15 C22 13,20 12,19 15" fill="#5a9e4a" opacity="0.7"/>
          <path d="M27 15 C22 17,20 18,19 15" fill="#5a9e4a" opacity="0.7"/>

  { id: 'fever', label: '🌡 ลดไข้ & สมดุลความร้อน', desc: 'ลดไข้ ระบายความร้อน ขับเหงื่อ ปรับอุณหภูมิ' },

// ===== RENDER =====
function getPotencyLabel(p) {
  if(p==='cold') return {cls:'potency-cold', text:'❄ ฤทธิ์เย็น'};
  if(p==='hot') return {cls:'potency-hot', text:'🔥 ฤทธิ์ร้อน'};
  return {cls:'potency-neutral', text:'⚖ ฤทธิ์กลาง'};
}

function buildCard(herb) {
  const p = getPotencyLabel(herb.potency);
  return `
  <div class="herb-card" data-id="${herb.id}" data-tags="${herb.tags.join(' ')}" onclick="openModal('${herb.id}')">
    <div class="card-sketch">
      ${getSketch(herb.sketch)}
    </div>
    <div class="card-body">
      <div class="card-thai">${herb.thai}</div>
      <div class="card-latin">${herb.latin}</div>
      <div class="card-potency ${p.cls}">${p.text}</div>
      <div class="card-tags">
        ${herb.tags.slice(0,3).map(t=>categoryDefs.find(c=>c.id===t)).filter(Boolean).map(c=>`<span class="tag">${c.label.split(' ').slice(1).join(' ')}</span>`).join('')}
      </div>
      <div class="card-summary">${herb.summary}</div>
    </div>
    <div class="card-footer">
      <span class="card-type">${herb.english}</span>
      <span class="card-open">เปิดดู ›</span>
    </div>
  </div>`;
}

function buildModal(herb) {
  const p = getPotencyLabel(herb.potency);
  return `
  <div class="modal-top">
    <div class="modal-sketch-panel">${getSketch(herb.sketch, '#c89428')}</div>
    <div class="modal-info">
      <div class="modal-thai">${herb.thai}</div>
      <div class="modal-latin">${herb.latin} · ${herb.english}</div>
      <div class="modal-potency ${p.cls}">${p.text}</div>
      <div class="modal-desc">${herb.description}</div>
    </div>
  </div>
  <div class="modal-body">
    <div class="modal-section">
      <div class="modal-section-title">สรรพคุณทางยา</div>
      <div class="modal-properties">
        ${herb.properties.map(pr=>`<span class="modal-tag">${pr}</span>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">การเตรียม & ตาก</div>
      <div class="modal-text">${herb.preparation}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">วิธีใช้งาน</div>
      <div class="method-grid">
        ${herb.methods.map(m=>`
        <div class="method-item">
          <div class="method-name">⚗ ${m.name}</div>
          <div class="method-desc">${m.desc}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">⚠ ข้อควรระวัง</div>
      <div class="modal-warning"><strong>คำเตือน</strong>${herb.warning}</div>
    </div>
  </div>`;
}

function renderAll(filter='all', search='') {
  const main = document.getElementById('mainContent');
  const noResults = document.getElementById('noResults');
  const resultCount = document.getElementById('resultCount');

  // filter herbs
  let filtered = herbs.filter(h => {
    const matchFilter = filter==='all' || h.tags.includes(filter);
    const matchSearch = !search || 
      h.thai.toLowerCase().includes(search) ||
      h.english.toLowerCase().includes(search) ||
      h.latin.toLowerCase().includes(search) ||
      h.summary.includes(search) ||
      h.properties.some(p=>p.includes(search));
    return matchFilter && matchSearch;
  });

  // group by category
  let html = '';
  let totalShown = 0;

  const catsToShow = filter==='all' ? categoryDefs : categoryDefs.filter(c=>c.id===filter);

  catsToShow.forEach(cat => {
    const catHerbs = filtered.filter(h => h.tags.includes(cat.id));
    if(catHerbs.length === 0) return;
    totalShown += catHerbs.length;
    html += `<div class="category-section">
      <div class="cat-header">
        <div class="cat-title">${cat.label}</div>
        <div class="cat-count">${catHerbs.length} ชนิด</div>
      </div>
      <div class="herb-grid">
        ${catHerbs.map(buildCard).join('')}
      </div>
    </div>`;
  });

  // for 'all' filter, also show herbs not in any shown category
  if(filter==='all' && search) {
    const shownIds = catsToShow.flatMap(c=>filtered.filter(h=>h.tags.includes(c.id)).map(h=>h.id));
    const remaining = filtered.filter(h=>!shownIds.includes(h.id));
    if(remaining.length > 0) {
      totalShown += remaining.length;
      html += `<div class="category-section">
        <div class="cat-header"><div class="cat-title">ผลการค้นหาอื่นๆ</div></div>
        <div class="herb-grid">${remaining.map(buildCard).join('')}</div>
      </div>`;
    }
  }

  // inject
  const existingSections = main.querySelectorAll('.category-section');
  existingSections.forEach(s=>s.remove());
  main.insertAdjacentHTML('beforeend', html);

  noResults.classList.toggle('visible', totalShown===0);
  resultCount.textContent = `— สมุนไพร ${totalShown} ชนิด —`;
}

// ===== MODAL =====
function openModal(id) {
  const herb = herbs.find(h=>h.id===id);
  if(!herb) return;
  document.getElementById('modalInner').innerHTML = buildModal(herb);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

// ===== FILTERS =====
let currentFilter = 'all';
let currentSearch = '';

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    renderAll(currentFilter, currentSearch);
  });
});

document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value.toLowerCase().trim();
  renderAll(currentFilter, currentSearch);
});

// Initial render
renderAll();
</script>
